<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content="width=device-width,initial-scale=1.0">
        <title>CadenceKey</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel=stylesheet href="style.css">

    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark custom2">
            <div class="container-fluid">
                <a class="navbar-brand rubik-glitch-pop" id="homeLogo" href="#">CadenceKey</a>
                <div class="d-flex gap-3">
                    <ul class="navbar-nav ms-auto rubik-glitch">
                        <li id="infoLink"><a class="nav-link" href="#" id="load-info">Info</a></li>
                    </ul>
                </div>
            </div>
        </nav>



        <!-- VIEWS: -->
        <div id="landing-view" class="landing text-center" >
            <h1 class="display-4 mb-4 display-text">Welcome to </h1> <h1 class="display-4 mb-4  display-text swansea" style="font-family:SwanseaBold;" h1> CadenceKey </h1>
            <div>
                <button id="entryBtn" class="btn glass">Enter</button>
            </div>
        </div>
        <div id="gallery-view" class="text-center hidden swanseaItaliBold" >
            <div class="position-absolute top-50 start-50 translate-middle-x">
                <button id="listenBtn" class="cadence-btn swanseaItaliBold  glass ">SING</button>
            </div>            
            <div class="mt-4 mb-4">
                <button id="startBtn" class="-btn glass m-4">Start recording</button>
                <button id="stopBtn" class="-btn glass m-4">Stop recording</button>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="index.js"></script>





    </body>
